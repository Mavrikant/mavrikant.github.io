name: Compress Images
on:
  pull_request:
    branches: [ master ]
    paths:
      - 'img/**'
      - 'favicon.jpg'

concurrency:
  group: compress-images-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: calibreapp/image-actions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Compress Images
        uses: calibreapp/image-actions@1.4.1
        with:
          # The `GITHUB_TOKEN` is automatically generated by GitHub and scoped only to the repository that is currently running the action. By default, the action can’t update Pull Requests initiated from forked repositories.
          # See https://docs.github.com/en/actions/reference/authentication-in-a-workflow and https://help.github.com/en/articles/virtual-environments-for-github-actions#token-permissions
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          # Animated WebP covers must be skipped; recompression flattens them to a
          # single frame. (ignorePaths overrides the default, so keep node_modules.)
          ignorePaths: 'img/posts/coupling-dengesi-cover.webp,node_modules/**'
