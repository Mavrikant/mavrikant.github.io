<p>Bana ulaşmak ister misiniz? Aşağıdaki formu doldurarak mesaj gönderin, en kısa sürede dönüş yapayım.</p>

<form class="contact-form" action="https://formspree.io/f/meqnbvan" method="post" novalidate>
  <div class="form-field">
    <input type="text" id="contact-name" name="name" placeholder=" " required autocomplete="name">
    <label for="contact-name">İsim</label>
  </div>

  <div class="form-field">
    <input type="email" id="contact-email" name="email" placeholder=" " required autocomplete="email">
    <label for="contact-email">E-posta</label>
  </div>

  <div class="form-field">
    <input type="tel" id="contact-phone" name="phone" placeholder=" " autocomplete="tel">
    <label for="contact-phone">Telefon (opsiyonel)</label>
  </div>

  <div class="form-field">
    <textarea id="contact-message" name="message" rows="5" placeholder=" " required></textarea>
    <label for="contact-message">Mesaj</label>
  </div>

  <button type="submit" class="btn btn-primary contact-form__submit">Gönder</button>
</form>
