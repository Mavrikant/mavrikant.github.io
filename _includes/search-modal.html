<!-- Site içi arama — içerik /search.json'dan ilk açılışta yüklenir -->
<div id="search-modal" class="search-modal" hidden>
  <div class="search-modal__backdrop" data-search-close></div>
  <div class="search-modal__panel" role="dialog" aria-modal="true" aria-label="Site içi arama">
    <div class="search-modal__bar">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="search-input" type="search" placeholder="Yazılarda ara…" autocomplete="off" aria-label="Arama sorgusu">
      <button type="button" class="search-modal__close" data-search-close aria-label="Aramayı kapat">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <ul id="search-results" class="search-modal__results" role="listbox" aria-label="Arama sonuçları"></ul>
    <p id="search-empty" class="search-modal__empty" hidden>Sonuç bulunamadı.</p>
    <p class="search-modal__hint"><kbd>Esc</kbd> kapatır &middot; <kbd>Ctrl</kbd>+<kbd>K</kbd> açar</p>
  </div>
</div>
