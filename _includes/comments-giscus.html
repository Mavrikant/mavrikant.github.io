<div id="giscus-container" class="giscus-container"></div>
<script>
  (function () {
    var loaded = false;
    function loadGiscus() {
      if (loaded) return;
      loaded = true;
      var s = document.createElement('script');
      s.src = 'https://giscus.app/client.js';
      s.async = true;
      s.crossOrigin = 'anonymous';
      s.setAttribute('data-repo', '{{ site.giscus.repo }}');
      s.setAttribute('data-repo-id', '{{ site.giscus.repo_id }}');
      s.setAttribute('data-category', '{{ site.giscus.category }}');
      s.setAttribute('data-category-id', '{{ site.giscus.category_id }}');
      // Yorumları .html kanonik URL'sine sabitle; uzantısız adreste de aynı dizi yüklensin
      s.setAttribute('data-mapping', 'specific');
      s.setAttribute('data-term', '{{ page.url | prepend: site.url }}');
      s.setAttribute('data-strict', '0');
      s.setAttribute('data-reactions-enabled', '1');
      s.setAttribute('data-emit-metadata', '0');
      s.setAttribute('data-input-position', 'bottom');
      s.setAttribute('data-theme', document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light');
      s.setAttribute('data-lang', 'tr');
      s.setAttribute('data-loading', 'lazy');
      document.getElementById('giscus-container').appendChild(s);
    }
    if ('IntersectionObserver' in window) {
      var observer = new IntersectionObserver(function (entries) {
        if (entries[0].isIntersecting) {
          loadGiscus();
          observer.disconnect();
        }
      }, { rootMargin: '200px' });
      observer.observe(document.getElementById('giscus-container'));
    } else {
      loadGiscus();
    }
  })();
</script>
<noscript>Yorumları görüntülemek için JavaScript'i etkinleştirin (<a href="https://giscus.app" rel="noopener">giscus</a>).</noscript>
