<head>
<meta charset="utf-8">
<!-- Content Security Policy: defense-in-depth against supply-chain script
     injection (e.g. the polyfill.io attack). script-src is an explicit
     allowlist of the CDNs this site actually uses, so any unlisted external
     script (such as polyfill.io) is blocked by the browser. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net https://cdn.plot.ly https://plausible.io https://js.sentry-cdn.com https://browser.sentry-cdn.com https://*.disqus.com https://*.disquscdn.com https://giscus.app; style-src 'self' 'unsafe-inline' https://*.disquscdn.com; font-src 'self' data: https://cdn.jsdelivr.net https://*.disquscdn.com; img-src 'self' data: https:; connect-src 'self' https://plausible.io https://www.googletagmanager.com https://www.google-analytics.com https://*.google-analytics.com https://analytics.google.com https://*.analytics.google.com https://www.google.com https://*.sentry.io https://*.disqus.com https://*.disquscdn.com; frame-src 'self' https://disqus.com https://*.disqus.com https://giscus.app https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:; manifest-src 'self'; form-action 'self' https://formspree.io">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
{% favicon %}
{% seo %}
{% include sentry.html %}
{% include plausible.html %}
<script>
  // No-flash dark mode: applies the saved theme before paint.
  (function () {
    try {
      var stored = localStorage.getItem('theme');
      var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      var theme = stored || (prefersDark ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {}
  })();
</script>
<link rel="preload" as="font" type="font/woff2" crossorigin href="{{ "/assets/fonts/inter-var-latin-ext.woff2" | relative_url }}">
<link rel="preload" as="font" type="font/woff2" crossorigin href="{{ "/assets/fonts/source-serif-4-var-latin-ext.woff2" | relative_url }}">
{% if page.background %}<link rel="preload" as="image" href="{{ page.background | prepend: site.baseurl | replace: '//', '/' }}" fetchpriority="high">{% endif %}
{% if page.mermaid %}<script async src="https://cdnjs.cloudflare.com/ajax/libs/mermaid/11.12.0/mermaid.min.js" integrity="sha512-5TKaYvhenABhlGIKSxAWLFJBZCSQw7HTV7aL1dJcBokM/+3PNtfgJFlv8E6Us/B1VMlQ4u8sPzjudL9TEQ06ww==" crossorigin="anonymous"></script>{% endif %}
<link rel="stylesheet" href="{{"/assets/main.css" | relative_url }}">
<link rel="alternate" type="application/rss+xml" title="{{ site.title | escape }}" href="{{ "/feed.xml" | relative_url }}">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0e1014" media="(prefers-color-scheme: dark)">
<link rel="manifest" href="{{ "/manifest.json" | relative_url }}">
</head>
